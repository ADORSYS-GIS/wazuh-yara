name: Run Pytest

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  run-pytest-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies and Wazuh agent
      run: |
        # Install dependencies
        sudo apt-get update
        sudo apt-get install -y curl gnupg2 
        pip install pytest pytest-testinfra
    - name: Check install.sh syntax
      run: |
        sudo apt-get install -y shellcheck
        shellcheck --shell=bash scripts/install.sh
        
    - name: Install Wazuh agent
      run: |
        curl -sfL https://raw.githubusercontent.com/ADORSYS-GIS/wazuh-agent/main/scripts/install.sh | sudo bash    
    
    - name: Run yara install script
      run: |
        bash scripts/install.sh

    - name: Run tests 
      run: |
        sudo $(which pytest) -vv scripts/tests/yara.py
        

  run-pytest-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        brew update
        brew install python3 coreutils gnu-sed shellcheck
        pip3 install pytest pytest-testinfra

    - name: Check install.sh syntax
      run: |
        shellcheck --shell=bash scripts/install.sh
        
    - name: Install Wazuh agent
      run: |
        curl -sfL https://raw.githubusercontent.com/ADORSYS-GIS/wazuh-agent/main/scripts/install.sh | sudo bash
    
    - name: Run yara install script
      run: |
        bash scripts/install.sh

    - name: Run tests
      run: |
        sudo $(which pytest) -vv scripts/tests/yara.py

  release:
    name: Release
    permissions: write-all
    needs:
      - run-pytest-linux
      - run-pytest-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF#refs/tags/}

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.git_cliff.outputs.content }}
          draft: false
          prerelease: false

      - name: Create Pull Request to update CHANGELOG.md
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHANGELOG.md"
          title: "Update Changelog"
          body: |
            This PR updates the CHANGELOG.md to include all releases.
            - Generated using git-cliff
            - Triggered by: ${{ github.event_name }}
          branch: update-changelog-${{ github.run_id }}
          base: main
          delete-branch: true
          labels: documentation, automated-pr